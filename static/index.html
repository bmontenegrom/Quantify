<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quantify - Laboratorio de fisica</title>
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <section id="login-screen" class="login-screen">
      <form id="login-form" class="login-card">
        <p class="eyebrow">Laboratorio de fisica</p>
        <h1>Quantify</h1>
        <label>
          Usuario
          <input name="username" required autocomplete="username" placeholder="docente" />
        </label>
        <label>
          Contrasena
          <input name="password" type="password" required autocomplete="current-password" placeholder="docente123" />
        </label>
        <button type="submit">Entrar</button>
        <span id="login-status" role="status"></span>
      </form>
    </section>

    <div id="app-shell" class="hidden">
    <header class="topbar">
      <div>
        <p class="eyebrow">Laboratorio de fisica</p>
        <h1>Quantify</h1>
      </div>
      <div class="topbar-actions">
        <nav class="tabs" aria-label="Vistas">
          <button class="tab active" data-view="student">Estudiantes</button>
          <button class="tab teacher-only" data-view="teacher">Docentes</button>
        </nav>
        <div class="session-box">
          <span id="session-user"></span>
          <button id="logout-button" type="button">Salir</button>
        </div>
      </div>
    </header>

    <main>
      <section id="student-view" class="view active">
        <div class="section-head">
          <h2>Cargar medidas</h2>
          <p>Subi un CSV con encabezados y columnas numericas.</p>
        </div>

        <form id="submission-form" class="panel">
          <div class="form-grid">
            <label>
              Estudiante
              <input name="student_name" required placeholder="Nombre y apellido" />
            </label>
            <label>
              Grupo
              <input name="group_name" required placeholder="Grupo 3" />
            </label>
            <label>
              Curso
              <input name="course" required placeholder="Fisica Experimental I" />
            </label>
            <label>
              Practica
              <select name="practice_id" id="practice-select" required></select>
            </label>
          </div>

          <label>
            Archivo CSV
            <input name="csv_file" type="file" accept=".csv,text/csv" required />
          </label>

          <div class="actions">
            <button type="submit">Subir y analizar</button>
            <span id="submit-status" role="status"></span>
          </div>
        </form>

        <section id="latest-result" class="panel hidden" aria-live="polite"></section>
      </section>

      <section id="teacher-view" class="view">
        <div class="section-head">
          <h2>Correccion docente</h2>
          <p>Revisa entregas, advertencias y resultados automaticos.</p>
        </div>

        <div class="teacher-grid">
          <section class="panel">
            <div class="list-head">
              <h3>Entregas</h3>
              <button id="refresh-submissions" type="button">Actualizar</button>
            </div>
            <div id="submission-list" class="submission-list"></div>
          </section>

          <section id="submission-detail" class="panel detail-empty">
            Selecciona una entrega para ver el detalle.
          </section>
        </div>
      </section>
    </main>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
